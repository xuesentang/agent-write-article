version: '3.8'

services:
  # Redis 服务
  redis:
    image: redis:7-alpine
    container_name: article-redis
    restart: always
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: article-backend
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/app/data
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/article.db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - FRONTEND_URL=http://119.91.53.107
    depends_on:
      redis:
        condition: service_healthy

  # Nginx 反向代理 + 前端静态文件
  nginx:
    image: nginx:alpine
    container_name: article-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend

volumes:
  redis_data:
  backend_data:
